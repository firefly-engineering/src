# toolchain.toml - Toolchain version declarations
#
# This file declares which toolchain versions to use for the project.
# The toolchain synchronization module resolves these declarations to
# concrete Nix derivations for use in both the development shell and Buck2.
#
# Syntax:
#   [<toolchain-name>]
#   version = "<version-string>"
#
# Version strings must match registry entries.
# See nix/modules/toolchains/registry-default.nix for available versions.

[go]
version = "1.21.5"

[rust]
version = "1.75.0"

[python]
version = "3.12"

[clang]
version = "17"
