# Toolchain Configuration
#
# This file declares which toolchain versions the project uses.
# Both the development shell and Buck2 builds will use these exact versions.
#
# Syntax:
#   [toolchain-name]
#   version = "version-string"
#
# Available toolchains are defined in the registry (see nix/modules/toolchains/registry-default.nix)
# or can be customized via firefly.toolchains.registry option

[go]
version = "1.22.1"

[nodejs]
version = "20"

[python]
version = "3.12"
